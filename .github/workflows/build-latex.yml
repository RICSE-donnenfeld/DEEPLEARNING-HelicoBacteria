name: Build LaTeX PDF

on:
  pull_request:
    paths:
      - "latex/**"
      - ".github/workflows/build-latex.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "latex/**"
      - ".github/workflows/build-latex.yml"
  workflow_dispatch:

jobs:
  build-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render Mermaid diagram
        run: |
          npx -y @mermaid-js/mermaid-cli \
            -p .github/puppeteer-config.json \
            -i latex/figures/methodology.mmd \
            -o latex/figures/methodology.png

      - name: Build PDF
        uses: xu-cheng/latex-action@v3
        with:
          root_file: main.tex
          working_directory: latex
          args: -pdf -file-line-error -halt-on-error -interaction=nonstopmode

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: report-pdf
          path: latex/main.pdf

      - name: Upload generated figures
        uses: actions/upload-artifact@v4
        with:
          name: generated-figures
          path: latex/figures/methodology.png
